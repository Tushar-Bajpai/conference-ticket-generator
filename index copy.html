<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Conference ticket generator</title>

</head>
<body>

  <img src="assets/images/logo-full.svg" alt="" class="logo-conf">

  <!-- Form starts -->

  <h1>Your Journey to Coding Conf </h1>
  <h1 class="part-2">2026 Starts Here!</h1>
  <p class="subheading">
     Secure your spot at next year's biggest coding conference.
  </p>

  <div class="form-container">
    <form action="/" >
          <label for="avatar">
            Upload Avatar
          </label>
          <label class="upload-area">
              <input type="file" id="avatar" name="avatar" accept=".jpg, .jpeg, .png" hidden required/>
              <img src="assets/images/icon-upload.svg" alt="" >
              <p>Drag and drop or click to upload</p>

              <div class="avatar-img-button">
                <button class="remove-img" type="button">Remove Image</button>
                <button class="change-img" type="button">Change Image</button>
              </div>
            
          </label>
          <div class="hint">
            <img src="assets/images/icon-info.svg" alt=""> 
            <p class="hint-message">Upload your photo (JPG or PNG, max size: 500KB).</p>
              <p id="upload-error" class="error-message" style="display: none; color: red;">
                  File too large. Please upload a photo under 500KB.
              </p>
          </div>
        
          <label for="fname">Full Name</label>
          <input type="text" id="fname" name="fname" placeholder="John Doe" required>

          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="example@email" required>

          <label for="github">GitHub Username</label>
          <input type="text" id="github" name="github" placeholder="@yourusername" required>

          <button type="submit" class="submit-btn"> Generate My Ticket</button>
    </form>
  </div>
 

<script src="script.js"></script>
</body>
</html>
